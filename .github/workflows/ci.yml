name: CI

on:
  push:
  pull_request:

env:
  PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.5.x"

      - name: Sync and lint
        run: |
          uv sync --all-extras
          uv run ruff check src tests

      - name: Test
        run: uv run pytest -q

      - name: Build
        run: uv run python -m build

  shell-snippets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shell tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck zsh

      - name: ShellCheck (bundled bash/sh in repo + package data)
        run: |
          shellcheck --version
          shellcheck \
            .setup/install.sh \
            .setup/update.sh \
            scripts/play-faah.sh \
            bash/faah.bash \
            init/faah.bash \
            fzf/fzf.bash

      - name: zsh syntax (repo + synced package copy)
        run: |
          zsh -n zsh/faah.zsh
          zsh -n init/faah.zsh
          zsh -n fzf/fzf.zsh
          zsh -n src/faah/data/zsh/faah.zsh
